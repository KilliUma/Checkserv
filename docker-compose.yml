version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wearcheck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wearcheck
      POSTGRES_USER: wearcheck
      POSTGRES_PASSWORD: wearcheck_dev_password
    ports:
      - "5433:5432"  # Porta 5433 para não conflitar com PostgreSQL local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wearcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Cache - Opcional)
  redis:
    image: redis:7-alpine
    container_name: wearcheck-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Database Admin UI)
  adminer:
    image: adminer:latest
    container_name: wearcheck-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

  # WordPress (Headless CMS) - Opcional para desenvolvimento
  wordpress:
    image: wordpress:latest
    container_name: wearcheck-wordpress
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_password
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress-db

  wordpress-db:
    image: mysql:8.0
    container_name: wearcheck-wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - wordpress_db_data:/var/lib/mysql

volumes:
  postgres_data:
  redis_data:
  wordpress_data:
  wordpress_db_data:

networks:
  default:
    name: wearcheck-network
